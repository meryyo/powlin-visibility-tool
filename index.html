<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POWLIN — Hotel AI Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #6ea001;
      --green-light: #f0f7e0;
      --red: #e53e3e;
      --red-light: #fff5f5;
      --gray: #f7f8fa;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .owl-logo {
      width: 44px;
      height: 44px;
    }
    .brand h1 {
      font-size: 20px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* MAIN */
    main {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 28px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--green); }

    /* SELECTORS */
    .selector-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .selector-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .selector-btn.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .selector-btn:hover:not(.active) {
      border-color: #cbd5e0;
      color: var(--text);
    }

    /* IA CHECKBOXES */
    .ia-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ia-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .ia-chip.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .ia-chip { cursor: pointer; }

    /* IDIOMA */
    .lang-group {
      display: flex;
      gap: 8px;
    }

    /* RUN BUTTON */
    .btn-run {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.2px;
    }
    .btn-run:hover { background: #5c8801; }
    .btn-run:disabled { background: #a0aec0; cursor: not-allowed; }

    /* PROGRESS */
    #progress-section { display: none; }
    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.3s;
      width: 0%;
    }

    /* RESULTS TABLE */
    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .results-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
    }
    .results-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .results-table tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .badge-green { background: #c6f6d5; color: #276749; }
    .badge-red { background: #fed7d7; color: #9b2c2c; }
    .badge-loading { background: #e2e8f0; color: #718096; }

    /* SUMMARY */
    #summary-section { display: none; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      text-align: center;
      padding: 20px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .summary-card .number {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .summary-card .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .summary-card.green { background: var(--green-light); border-color: var(--green); }
    .summary-card.green .number { color: var(--green); }
    .summary-card.red { background: var(--red-light); border-color: var(--red); }
    .summary-card.red .number { color: var(--red); }
    .summary-card.neutral { background: var(--gray); }
    .summary-card.neutral .number { color: var(--text); }

    .ia-summary {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ia-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ia-name {
      width: 100px;
      font-weight: 600;
      font-size: 13px;
    }
    .ia-bar-wrap {
      flex: 1;
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .ia-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--green);
      transition: width 0.5s;
    }
    .ia-score {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      width: 50px;
      text-align: right;
    }

    .verdict-box {
      border-radius: 10px;
      padding: 20px 24px;
      margin-top: 20px;
    }
    .verdict-box.red-box {
      background: var(--red-light);
      border: 1px solid #fc8181;
    }
    .verdict-box.green-box {
      background: var(--green-light);
      border: 1px solid var(--green);
    }
    .verdict-box h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .verdict-box p {
      font-size: 13px;
      color: #4a5568;
      line-height: 1.6;
    }

    .btn-secondary {
      padding: 10px 20px;
      background: #fff;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--green-light); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .excerpt {
      font-size: 12px;
      color: var(--muted);
      max-width: 260px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* VIEW FULL RESPONSE BUTTON */
    .btn-view {
      display: inline-block;
      margin-top: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      background: var(--green-light);
      border: 1px solid var(--green);
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }
    .btn-view:hover { background: #d8edb0; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      max-width: 680px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }
    .modal-header h3 { font-size: 15px; font-weight: 700; color: var(--text); }
    .modal-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .modal-close {
      background: none; border: none; font-size: 22px; cursor: pointer;
      color: var(--muted); line-height: 1; padding: 0; flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .section-divider {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 16px 0 8px;
    }

    /* PROMPTS DROPDOWN */
    .prompts-dropdown { position: relative; }
    .prompts-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }
    .prompts-toggle:focus { outline: none; border-color: var(--green); }
    .chevron { font-size: 18px; color: var(--muted); }
    .prompts-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      z-index: 100;
      max-height: 320px;
      overflow-y: auto;
    }
    .prompts-list-inner { padding: 8px 0; }
    .prompt-block-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 10px 14px 4px;
    }
    .prompt-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .prompt-item:hover { background: var(--gray); }
    .prompt-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--green); cursor: pointer; }
    .prompt-item-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .prompt-item-id { font-size: 11px; color: var(--muted); font-weight: 600; margin-right: 4px; }
    .prompt-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--green-light);
      border: 1px solid var(--green);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
    }
    .prompt-preview-remove {
      background: none;
      border: none;
      color: var(--green);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 0 2px;
      line-height: 1;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      header { padding: 12px 16px; }
      main { margin: 16px auto; }
    }

    /* PRINT STYLES */
    @media print {
      /* Hide Connections card (API key), run button, print button, view full response buttons */
      #conexiones-card, #btn-run, .btn-secondary, .btn-view { display: none !important; }

      /* Hide Extract column (4th th and td) */
      table th:nth-child(4),
      table td:nth-child(4) { display: none !important; }

      body { background: #fff; }
      main { margin: 0; padding: 0; }

      /* Print footer CTA */
      body::after {
        content: "Activate Powlin from only 49€/month — powlin.com";
        display: block;
        text-align: center;
        font-family: 'Inter', sans-serif;
        font-size: 12px;
        font-weight: 600;
        color: #6ea001;
        border-top: 1px solid #e2e8f0;
        padding-top: 10px;
        margin-top: 24px;
      }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <img class="owl-logo" src="owl.png" alt="Powlin"/>
  <div class="brand">
    <h1>POWLIN</h1>
    <p>The Owl that gets your hotel seen by AI</p>
  </div>
</header>

<main>

  <!-- FORM -->
  <div class="card" id="hotel-card">
    <h2>Hotel details</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Hotel name</label>
        <input type="text" id="hotel-name" placeholder=""/>
      </div>
      <div class="form-group">
        <label>City</label>
        <input type="text" id="hotel-city" placeholder=""/>
      </div>
      <div class="form-group">
        <label>Alternative names <span style="font-weight:400;color:var(--muted)">(comma-separated, e.g. Hotel Sol, Sol Boutique)</span></label>
        <input type="text" id="hotel-aliases" placeholder="Hotel Sol, Sol Boutique, The Sol Hotel"/>
      </div>
      <div class="form-group">
        <label>Hotel website</label>
        <input type="text" id="hotel-web" placeholder=""/>
      </div>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="card" id="config-card">
    <h2>Test configuration</h2>

    <div class="form-group" style="margin-bottom:20px">
      <label>Prompts to test <span style="font-weight:400;color:var(--muted)">(max. 5)</span></label>
      <div class="prompts-dropdown">
        <button class="prompts-toggle" onclick="togglePromptsList()" type="button">
          <span id="prompts-toggle-label">Select prompts</span>
          <span class="chevron">&#8964;</span>
        </button>
        <div class="prompts-list" id="prompts-list" style="display:none">
          <div class="prompts-list-inner" id="prompts-list-inner"></div>
        </div>
      </div>
      <div id="selected-prompts-preview" style="margin-top:10px;display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <div class="form-group">
      <label>AI models to test</label>
      <div class="ia-grid">
        <div class="ia-chip active" onclick="toggleIA(this)" data-ia="chatgpt">ChatGPT</div>
        <div class="ia-chip active" onclick="toggleIA(this)" data-ia="perplexity">Perplexity</div>
        <div class="ia-chip active" onclick="toggleIA(this)" data-ia="gemini">Gemini</div>
        <div class="ia-chip active" onclick="toggleIA(this)" data-ia="claude">Claude</div>
      </div>
    </div>

    <div class="form-group" style="margin-top:20px">
      <label>Prompt language</label>
      <div class="ia-grid">
        <div class="ia-chip active" onclick="selectLang(this)" data-lang="EN">EN — English</div>
        <div class="ia-chip" onclick="selectLang(this)" data-lang="ES">ES — Español</div>
      </div>
    </div>
  </div>

  <!-- RUN -->
  <button class="btn-run" id="btn-run" onclick="runTest()">
    Analyze hotel AI visibility
  </button>

  <!-- PROGRESS -->
  <div class="card" id="progress-section">
    <div class="progress-header">
      <h2>Analyzing...</h2>
      <span id="progress-count" style="font-size:13px;color:var(--muted);font-weight:600">0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div style="overflow-x:auto">
      <table class="results-table">
        <thead>
          <tr>
            <th>AI</th>
            <th>Prompt</th>
            <th>Result</th>
            <th>Extract</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="card" id="summary-section">
    <h2>Visibility report</h2>
    <div class="summary-grid" id="summary-grid"></div>

    <div class="section-divider">Visibility by AI</div>
    <div class="ia-summary" id="ia-summary"></div>

    <div class="verdict-box" id="verdict-box">
      <h3></h3>
      <p></p>
    </div>

    <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn-secondary" onclick="resetForm()">New analysis</button>
      <button class="btn-secondary" onclick="window.print()">Print report</button>
    </div>
  </div>


  <!-- CONNECTIONS -->
  <div class="card" id="conexiones-card">
    <h2>Connections</h2>
    <div class="form-group">
      <label>OpenRouter API Key</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="password" id="openrouter-key" placeholder="" style="flex:1"
          oninput="saveKey(this.value)"/>
        <button class="btn-secondary" style="white-space:nowrap" onclick="toggleKeyVisibility()">Show</button>
      </div>
      <span id="key-status" style="font-size:12px;color:var(--muted);margin-top:4px"></span>
    </div>
  </div>

</main>

<!-- MODAL -->
<div class="modal-overlay" id="response-modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <h3 id="modal-title">AI Response</h3>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" onclick="document.getElementById('response-modal').classList.remove('open')">×</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const OPENROUTER_API_KEY = localStorage.getItem("openrouter_api_key") || "";
const PABBLY_WEBHOOK     = "https://connect.pabbly.com/webhook-listener/webhook/IjU3NjYwNTY5MDYzMzA0Mzc1MjZiNTUzNSI_3D_pc/IjU3NjcwNTY5MDYzNzA0MzI1MjY1NTUzMTUxMzEi_pc";

// Mapa de modelos por IA
const IA_MODELS = {
  chatgpt:    { name: "ChatGPT",    model: "openai/gpt-4o" },
  perplexity: { name: "Perplexity", model: "perplexity/sonar" },
  gemini:     { name: "Gemini",     model: "google/gemini-2.5-flash" },
  claude:     { name: "Claude",     model: "anthropic/claude-3.5-haiku" },
};

/// 20 prompts base (variable: {{city}})
const ALL_PROMPTS = [
  { id: "P01", block: "Generic",    en: "What hotels do you recommend in {{city}}?",                                                        es: "¿Qué hoteles me recomiendas en {{city}}?" },
  { id: "P02", block: "Generic",    en: "What are the best hotels to stay in {{city}}?",                                                    es: "¿Cuáles son los mejores hoteles para alojarse en {{city}}?" },
  { id: "P03", block: "Generic",    en: "Where is the best place to sleep in {{city}}?",                                                    es: "¿Dónde es mejor dormir en {{city}}?" },
  { id: "P04", block: "Generic",    en: "What areas are good to stay in {{city}} and what hotels are there?",                               es: "¿Qué zonas son buenas para alojarse en {{city}} y qué hoteles hay allí?" },
  { id: "P05", block: "Traveler",   en: "What hotel would you recommend in {{city}} for a weekend getaway?",                                es: "¿Qué hotel recomendarías en {{city}} para una escapada de fin de semana?" },
  { id: "P06", block: "Traveler",   en: "What hotel is a good option in {{city}} for a peaceful stay?",                                     es: "¿Qué hotel es buena opción en {{city}} para una estancia tranquila?" },
  { id: "P07", block: "Traveler",   en: "Where to stay in {{city}} if I want to be near the main points of interest?",                     es: "¿Dónde alojarse en {{city}} si quiero estar cerca de los principales puntos de interés?" },
  { id: "P08", block: "Traveler",   en: "I'm looking for a well-located hotel in {{city}} to explore the city, which do you recommend?",   es: "Busco un hotel en {{city}} bien ubicado para conocer la ciudad, ¿cuál recomiendas?" },
  { id: "P09", block: "Traveler",   en: "What hotel would you recommend in {{city}} to enjoy the local atmosphere?",                       es: "¿Qué hotel recomendarías en {{city}} para disfrutar del ambiente local?" },
  { id: "P10", block: "Experience", en: "What hotel is a good option in {{city}} if I want to get around on foot?",                        es: "¿Qué hotel es buena opción en {{city}} si quiero moverme a pie?" },
  { id: "P11", block: "Experience", en: "What hotel would you choose in {{city}} for a comfortable and hassle-free stay?",                 es: "¿Qué hotel elegirías en {{city}} para una estancia cómoda y sin complicaciones?" },
  { id: "P12", block: "Experience", en: "Which hotels in {{city}} do travelers recommend the most?",                                       es: "¿Qué hoteles de {{city}} suelen recomendar más los viajeros?" },
  { id: "P13", block: "Experience", en: "What hotel would you choose in {{city}} if you're looking for good value for money?",             es: "¿Qué hotel elegirías en {{city}} si buscas buena relación calidad-precio?" },
  { id: "P14", block: "Experience", en: "What hotels in {{city}} are a good alternative to the most well-known ones?",                    es: "¿Qué hoteles de {{city}} son una buena alternativa a los más conocidos?" },
  { id: "P15", block: "Comparison", en: "If you had to recommend a hotel in {{city}}, which would it be and why?",                        es: "Si tuvieras que recomendar un hotel en {{city}}, ¿cuál sería y por qué?" },
  { id: "P16", block: "Comparison", en: "What hotel in {{city}} would you recommend to someone who wants to avoid the most touristy hotels?", es: "¿Qué hotel en {{city}} recomendarías a alguien que quiere evitar los hoteles más turísticos?" },
  { id: "P17", block: "Comparison", en: "What hotel is a good option in {{city}} if I'm looking for something simple but well-located?",  es: "¿Qué hotel es buena opción en {{city}} si busco algo sencillo pero bien ubicado?" },
  { id: "P18", block: "Comparison", en: "Which hotel in {{city}} has the best reputation among travelers?",                               es: "¿Qué hotel de {{city}} tiene mejor reputación entre los viajeros?" },
  { id: "P19", block: "Refined",    en: "What is the most recommended hotel in {{city}} according to user reviews?",                      es: "¿Cuál es el hotel más recomendado en {{city}} según las valoraciones de los usuarios?" },
  { id: "P20", block: "Refined",    en: "What hotel in {{city}} would you highlight for its location and comfort?",                       es: "¿Qué hotel en {{city}} destacarías por su ubicación y comodidad?" },
];

// ─── STATE ────────────────────────────────────────────────
let selectedLang     = 'EN';
let selectedPromptIds = [];
let results          = [];
let totalCalls       = 0;
let completedCalls   = 0;
let responseStore    = []; // stores full AI responses for modal

// ─── PROMPTS DROPDOWN ─────────────────────────────────────
function buildPromptsList() {
  const inner = document.getElementById('prompts-list-inner');
  let currentBlock = '';
  ALL_PROMPTS.forEach(p => {
    if (p.block !== currentBlock) {
      currentBlock = p.block;
      const lbl = document.createElement('div');
      lbl.className = 'prompt-block-label';
      lbl.textContent = p.block;
      inner.appendChild(lbl);
    }
    const item = document.createElement('label');
    item.className = 'prompt-item';
    item.innerHTML = `
      <input type="checkbox" value="${p.id}" onchange="togglePrompt('${p.id}')"/>
      <span class="prompt-item-text"><span class="prompt-item-id">${p.id}</span>${p.en}</span>
    `;
    inner.appendChild(item);
  });
}

function togglePromptsList() {
  const list = document.getElementById('prompts-list');
  list.style.display = list.style.display === 'none' ? 'block' : 'none';
}

function togglePrompt(id) {
  if (selectedPromptIds.includes(id)) {
    selectedPromptIds = selectedPromptIds.filter(x => x !== id);
  } else {
    if (selectedPromptIds.length >= 5) {
      // desmarcar el checkbox
      document.querySelector(`.prompt-item input[value="${id}"]`).checked = false;
      alert('Max 5 prompts. Uncheck one before adding another.');
      return;
    }
    selectedPromptIds.push(id);
  }
  updatePromptToggleLabel();
  updateSelectedPreview();
}

function updatePromptToggleLabel() {
  const n = selectedPromptIds.length;
  document.getElementById('prompts-toggle-label').textContent =
    n === 0 ? 'Select prompts' : `${n} prompt${n > 1 ? 's' : ''} selected`;
}

function updateSelectedPreview() {
  const preview = document.getElementById('selected-prompts-preview');
  preview.innerHTML = '';
  selectedPromptIds.forEach(id => {
    const p = ALL_PROMPTS.find(x => x.id === id);
    if (!p) return;
    const div = document.createElement('div');
    div.className = 'prompt-preview';
    const txt = selectedLang === 'ES' ? p.es : p.en;
    div.innerHTML = `<span><strong>${p.id}</strong> — ${txt.length > 60 ? txt.slice(0,60)+'…' : txt}</span>
      <button class="prompt-preview-remove" onclick="removePrompt('${id}')" type="button">x</button>`;
    preview.appendChild(div);
  });
}

function removePrompt(id) {
  const cb = document.querySelector(`.prompt-item input[value="${id}"]`);
  if (cb) cb.checked = false;
  selectedPromptIds = selectedPromptIds.filter(x => x !== id);
  updatePromptToggleLabel();
  updateSelectedPreview();
}

// Cerrar dropdown al hacer click fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.prompts-dropdown')) {
    const list = document.getElementById('prompts-list');
    if (list) list.style.display = 'none';
  }
});


// ─── API KEY ──────────────────────────────────────────────
function saveKey(val) {
  localStorage.setItem("openrouter_api_key", val);
  document.getElementById("key-status").textContent = val ? "Saved in this browser" : "";
}

function toggleKeyVisibility() {
  const input = document.getElementById("openrouter-key");
  const btn = input.nextElementSibling;
  if (input.type === "password") {
    input.type = "text";
    btn.textContent = "Hide";
  } else {
    input.type = "password";
    btn.textContent = "Show";
  }
}

function loadSavedKey() {
  const saved = localStorage.getItem("openrouter_api_key");
  if (saved) {
    document.getElementById("openrouter-key").value = saved;
    document.getElementById("key-status").textContent = "Saved in this browser";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  buildPromptsList();
  loadSavedKey();
});



function selectLang(chip) {
  selectedLang = chip.dataset.lang;
  document.querySelectorAll('.ia-chip[data-lang]').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  rebuildPromptsList();
}

function rebuildPromptsList() {
  const inner = document.getElementById('prompts-list-inner');
  inner.innerHTML = '';
  let currentBlock = '';
  ALL_PROMPTS.forEach(p => {
    if (p.block !== currentBlock) {
      currentBlock = p.block;
      const lbl = document.createElement('div');
      lbl.className = 'prompt-block-label';
      lbl.textContent = p.block;
      inner.appendChild(lbl);
    }
    const item = document.createElement('label');
    item.className = 'prompt-item';
    const text = selectedLang === 'ES' ? p.es : p.en;
    const checked = selectedPromptIds.includes(p.id) ? 'checked' : '';
    item.innerHTML = `
      <input type="checkbox" value="${p.id}" ${checked} onchange="togglePrompt('${p.id}')"/>
      <span class="prompt-item-text"><span class="prompt-item-id">${p.id}</span>${text}</span>
    `;
    inner.appendChild(item);
  });
  updateSelectedPreview();
}

function toggleIA(chip) {
  chip.classList.toggle('active');
}

function getSelectedIAs() {
  return Array.from(document.querySelectorAll('.ia-chip.active[data-ia]')).map(el => el.dataset.ia);
}

function getSelectedPrompts() {
  return ALL_PROMPTS.filter(p => selectedPromptIds.includes(p.id));
}

// ─── MAIN TEST ────────────────────────────────────────────
async function runTest() {
  const hotelName  = document.getElementById('hotel-name').value.trim();
  const city       = document.getElementById('hotel-city').value.trim();
  const aliases    = document.getElementById('hotel-aliases').value.trim();
  const hotelWeb   = document.getElementById('hotel-web').value.trim();
  const ias        = getSelectedIAs();

  const apiKey = localStorage.getItem("openrouter_api_key") || "";
  if (!apiKey) { alert('Enter your OpenRouter API Key in the Connections section.'); return; }
  if (!hotelName || !city)         { alert('Please enter the hotel name and city.'); return; }
  if (ias.length === 0)            { alert('Select at least one AI model.'); return; }
  if (selectedPromptIds.length === 0) { alert('Select at least one prompt.'); return; }

  // Reset
  results = [];
  responseStore = [];
  completedCalls = 0;
  document.getElementById('results-body').innerHTML = '';
  document.getElementById('summary-section').style.display = 'none';
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('btn-run').disabled = true;

  const prompts = getSelectedPrompts();

  // Calcular total de llamadas
  totalCalls = prompts.length * ias.length;
  updateProgress();

  // Crear filas placeholder
  const tbody = document.getElementById('results-body');
  const tasks = [];

  for (const prompt of prompts) {
    for (const ia of ias) {
      const promptText = (selectedLang === 'ES' ? prompt.es : prompt.en).replace(/{{city}}/g, city);

      const rowId = `row-${prompt.id}-${ia}`;
      const tr = document.createElement('tr');
      tr.id = rowId;
      tr.innerHTML = `
        <td><strong>${IA_MODELS[ia].name}</strong></td>
        <td style="font-size:12px;max-width:220px">${promptText}</td>
        <td><span class="badge badge-loading"><span class="spinner"></span> Analyzing</span></td>
        <td>—</td>
      `;
      tbody.appendChild(tr);

      tasks.push({ prompt, ia, promptText, rowId, hotelName, city, aliases, hotelWeb });
    }
  }

  // Ejecutar en paralelo (máx 5 simultáneas)
  await runWithConcurrency(tasks, 5);

  showSummary(hotelName, city);
  document.getElementById('btn-run').disabled = false;
}

async function runWithConcurrency(tasks, limit) {
  const queue = [...tasks];
  const workers = Array(Math.min(limit, queue.length)).fill(null).map(async () => {
    while (queue.length > 0) {
      const task = queue.shift();
      if (task) await processTask(task);
    }
  });
  await Promise.all(workers);
}

async function processTask({ prompt, ia, promptText, rowId, hotelName, city, aliases, hotelWeb }) {
  const recordId = `HT-${Date.now().toString().slice(-6)}-${ia.slice(0,2).toUpperCase()}`;
  let result = { id: recordId, prompt, ia, promptText, lang: selectedLang, hotelName, city, aliases, hotelWeb, appears: false, excerpt: '', sources: '' };

  try {
    // 1. Llamada a la IA via OpenRouter
    const aiResponse = await callOpenRouter(IA_MODELS[ia].model, promptText);
    const fullText   = aiResponse || '';
    result.excerpt   = fullText.slice(0, 1900);
    result.sources   = extractSources(fullText);

    // 2. Detección de mención del hotel
    result.appears = await detectMention(fullText, hotelName, aliases);

    // 3. Actualizar fila en tabla
    updateRow(rowId, result);

    // 4. Enviar a Pabbly
    await sendToPabbly(result);

  } catch (err) {
    console.error('Error en task:', err);
    const tr = document.getElementById(rowId);
    if (tr) tr.querySelector('td:nth-child(4)').innerHTML = '<span class="badge badge-loading">Error</span>';
  }

  results.push(result);
  completedCalls++;
  updateProgress();
}

async function callOpenRouter(model, prompt) {
  const key = localStorage.getItem('openrouter_api_key') || OPENROUTER_API_KEY;
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json',
      'HTTP-Referer': 'https://powlin.com',
      'X-Title': 'Powlin Hotel AI Tracker'
    },
    body: JSON.stringify({
      model,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 800
    })
  });
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

async function detectMention(text, hotelName, aliases) {
  const allNames = [hotelName, ...aliases.split(',').map(a => a.trim()).filter(Boolean)].join(', ');
  const detectionPrompt = `Analyze whether the following text mentions the hotel "${hotelName}" or any of its aliases: ${allNames}.
Reply ONLY with "YES" if it is mentioned (even partially, with variations or aliases), or "NO" if it does not appear at all.
Do not explain anything else.

TEXT:
${text.slice(0, 2000)}`;

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${localStorage.getItem('openrouter_api_key') || OPENROUTER_API_KEY}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': 'https://powlin.com',
        'X-Title': 'Powlin Hotel AI Tracker'
      },
      body: JSON.stringify({
        model: 'openai/gpt-4o-mini',
        messages: [{ role: 'user', content: detectionPrompt }],
        max_tokens: 5,
        temperature: 0
      })
    });
    const data = await res.json();
    const answer = data.choices?.[0]?.message?.content?.trim().toUpperCase() || 'NO';
    return answer.includes('YES');
  } catch { return false; }
}

function extractSources(text) {
  const urlRegex = /https?:\/\/[^\s\)\]]+/g;
  const urls = text.match(urlRegex) || [];
  return urls.slice(0, 5).join(', ');
}

function updateRow(rowId, result) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const badgeYes = selectedLang === 'ES' ? 'APARECE'    : 'APPEARS';
  const badgeNo  = selectedLang === 'ES' ? 'NO APARECE' : 'NOT FOUND';
  const badge = result.appears
    ? `<span class="badge badge-green">${badgeYes}</span>`
    : `<span class="badge badge-red">${badgeNo}</span>`;
  const safeExcerpt = result.excerpt.replace(/</g,'&lt;');
  const storeIdx = responseStore.length;
  responseStore.push({ ia: IA_MODELS[result.ia].name, prompt: result.promptText, response: result.excerpt });
  const excerpt = result.excerpt
    ? `<div class="excerpt">${safeExcerpt.slice(0,100)}…</div>
       <button class="btn-view" onclick="openModal(${storeIdx})">View full response</button>`
    : '—';
  tr.querySelector('td:nth-child(3)').innerHTML = badge;
  tr.querySelector('td:nth-child(4)').innerHTML = excerpt;
}

async function sendToPabbly(result) {
  const payload = {
    "Nombre registro":    result.id,
    "Hotel":              result.hotelName,
    "Aliases":            result.aliases,
    "Ciudad":             result.city,
    "IA":                 IA_MODELS[result.ia].name,
    "Idioma":             result.lang,
    "Prompt ID":          result.prompt.id,
    "Prompt texto":       result.promptText.slice(0, 500),
    "Resultado":          result.appears ? 'APARECE' : 'NO APARECE',
    "Extracto respuesta": result.excerpt.slice(0, 1900),
    "Fuentes detectadas": result.sources.slice(0, 500),
    "Fecha test":         new Date().toISOString().split('T')[0],
    "Ejecutado por":      'Carlos - Powlin Sales'
  };
  try {
    await fetch(PABBLY_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      mode: 'no-cors'
    });
  } catch (e) { console.warn('Pabbly error:', e); }
}

function updateProgress() {
  const pct = totalCalls > 0 ? Math.round((completedCalls / totalCalls) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-count').textContent = `${completedCalls} / ${totalCalls}`;
  document.querySelector('#progress-section h2').textContent =
    completedCalls === totalCalls ? 'Analysis complete' : 'Analyzing...';
}

// ─── SUMMARY ──────────────────────────────────────────────
function showSummary(hotelName, city) {
  const total    = results.length;
  const appears  = results.filter(r => r.appears).length;
  const noAppears = total - appears;
  const score    = total > 0 ? Math.round((appears / total) * 100) : 0;

  // Summary cards
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = `
    <div class="summary-card neutral">
      <div class="number">${total}</div>
      <div class="label">Tests run</div>
    </div>
    <div class="summary-card green">
      <div class="number">${appears}</div>
      <div class="label">Appears in AI</div>
    </div>
    <div class="summary-card red">
      <div class="number">${noAppears}</div>
      <div class="label">Does not appear</div>
    </div>
    <div class="summary-card ${score >= 50 ? 'green' : 'red'}">
      <div class="number">${score}%</div>
      <div class="label">AI Visibility</div>
    </div>
  `;

  // Por IA
  const iaSummaryEl = document.getElementById('ia-summary');
  iaSummaryEl.innerHTML = '';
  const selectedIAs = getSelectedIAs();
  for (const ia of selectedIAs) {
    const iaResults   = results.filter(r => r.ia === ia);
    const iaAppears   = iaResults.filter(r => r.appears).length;
    const iaTotal     = iaResults.length;
    const iaPct       = iaTotal > 0 ? Math.round((iaAppears / iaTotal) * 100) : 0;
    iaSummaryEl.innerHTML += `
      <div class="ia-row">
        <div class="ia-name">${IA_MODELS[ia].name}</div>
        <div class="ia-bar-wrap"><div class="ia-bar-fill" style="width:${iaPct}%;background:${iaPct > 0 ? 'var(--green)' : 'var(--red)'}"></div></div>
        <div class="ia-score">${iaAppears}/${iaTotal}</div>
      </div>
    `;
  }

  // Veredicto
  const verdictBox = document.getElementById('verdict-box');
  if (score === 0) {
    verdictBox.className = 'verdict-box red-box';
    verdictBox.querySelector('h3').textContent = `${hotelName} is invisible to AI`;
    verdictBox.querySelector('p').textContent  = `In none of the ${total} tests across ${selectedIAs.length} different AI models does ${hotelName} appear as a recommendation. When a traveler asks ChatGPT, Perplexity, Gemini or other AIs about hotels in ${city}, your hotel simply does not exist. Powlin can change that.`;
  } else if (score < 40) {
    verdictBox.className = 'verdict-box red-box';
    verdictBox.querySelector('h3').textContent = `${hotelName} has very low AI visibility`;
    verdictBox.querySelector('p').textContent  = `It only appears in ${score}% of tests. The vast majority of travelers asking an AI about hotels in ${city} will not find ${hotelName}. There is a clear opportunity for improvement.`;
  } else {
    verdictBox.className = 'verdict-box green-box';
    verdictBox.querySelector('h3').textContent = `${hotelName} has AI presence`;
    verdictBox.querySelector('p').textContent  = `It appears in ${score}% of tests. There is a visibility base, but there are still AI models and prompts where it does not appear. Powlin can consolidate and expand that presence.`;
  }

  document.getElementById('summary-section').style.display = 'block';
  document.getElementById('summary-section').scrollIntoView({ behavior: 'smooth' });
}

function openModal(idx) {
  const item = responseStore[idx];
  document.getElementById('modal-title').textContent = item.ia + ' — Full Response';
  document.getElementById('modal-meta').textContent = 'Prompt: ' + item.prompt;
  document.getElementById('modal-body').textContent = item.response;
  document.getElementById('response-modal').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('response-modal')) {
    document.getElementById('response-modal').classList.remove('open');
  }
}

function resetForm() {
  results = [];
  document.getElementById('results-body').innerHTML = '';
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('summary-section').style.display  = 'none';
  document.getElementById('hotel-name').value  = '';
  document.getElementById('hotel-city').value  = '';
  document.getElementById('hotel-aliases').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
