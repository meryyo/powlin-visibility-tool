<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>POWLIN — Hotel AI Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #6ea001;
      --green-light: #f0f7e0;
      --red: #e53e3e;
      --red-light: #fff5f5;
      --gray: #f7f8fa;
      --border: #e2e8f0;
      --text: #1a202c;
      --muted: #718096;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f6f9;
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .owl-logo {
      width: 44px;
      height: 44px;
    }
    .brand h1 {
      font-size: 20px;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.5px;
    }
    .brand p {
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* MAIN */
    main {
      max-width: 860px;
      margin: 32px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 28px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* FORM */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="text"], input[type="password"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--green); }

    /* SELECTORS */
    .selector-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .selector-btn {
      padding: 8px 18px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .selector-btn.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .selector-btn:hover:not(.active) {
      border-color: #cbd5e0;
      color: var(--text);
    }

    /* IA CHECKBOXES */
    .ia-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ia-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .ia-chip.active {
      border-color: var(--green);
      background: var(--green-light);
      color: var(--green);
    }
    .ia-chip input { display: none; }

    /* IDIOMA */
    .lang-group {
      display: flex;
      gap: 8px;
    }

    /* RUN BUTTON */
    .btn-run {
      width: 100%;
      padding: 14px;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.2px;
    }
    .btn-run:hover { background: #5c8801; }
    .btn-run:disabled { background: #a0aec0; cursor: not-allowed; }

    /* PROGRESS */
    #progress-section { display: none; }
    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .progress-bar-wrap {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 99px;
      transition: width 0.3s;
      width: 0%;
    }

    /* RESULTS TABLE */
    .results-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .results-table th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px;
      border-bottom: 2px solid var(--border);
    }
    .results-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .results-table tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }
    .badge-green { background: #c6f6d5; color: #276749; }
    .badge-red { background: #fed7d7; color: #9b2c2c; }
    .badge-loading { background: #e2e8f0; color: #718096; }

    /* SUMMARY */
    #summary-section { display: none; }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .summary-card {
      text-align: center;
      padding: 20px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .summary-card .number {
      font-size: 36px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 6px;
    }
    .summary-card .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .summary-card.green { background: var(--green-light); border-color: var(--green); }
    .summary-card.green .number { color: var(--green); }
    .summary-card.red { background: var(--red-light); border-color: var(--red); }
    .summary-card.red .number { color: var(--red); }
    .summary-card.neutral { background: var(--gray); }
    .summary-card.neutral .number { color: var(--text); }

    .ia-summary {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ia-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ia-name {
      width: 100px;
      font-weight: 600;
      font-size: 13px;
    }
    .ia-bar-wrap {
      flex: 1;
      background: var(--border);
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
    }
    .ia-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--green);
      transition: width 0.5s;
    }
    .ia-score {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      width: 50px;
      text-align: right;
    }

    .verdict-box {
      border-radius: 10px;
      padding: 20px 24px;
      margin-top: 20px;
    }
    .verdict-box.red-box {
      background: var(--red-light);
      border: 1px solid #fc8181;
    }
    .verdict-box.green-box {
      background: var(--green-light);
      border: 1px solid var(--green);
    }
    .verdict-box h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .verdict-box p {
      font-size: 13px;
      color: #4a5568;
      line-height: 1.6;
    }

    .btn-secondary {
      padding: 10px 20px;
      background: #fff;
      border: 2px solid var(--green);
      color: var(--green);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--green-light); }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .excerpt {
      font-size: 12px;
      color: var(--muted);
      max-width: 300px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .section-divider {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 16px 0 8px;
    }

    /* PROMPTS DROPDOWN */
    .prompts-dropdown { position: relative; }
    .prompts-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }
    .prompts-toggle:focus { outline: none; border-color: var(--green); }
    .chevron { font-size: 18px; color: var(--muted); }
    .prompts-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      z-index: 100;
      max-height: 320px;
      overflow-y: auto;
    }
    .prompts-list-inner { padding: 8px 0; }
    .prompt-block-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      padding: 10px 14px 4px;
    }
    .prompt-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 14px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .prompt-item:hover { background: var(--gray); }
    .prompt-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--green); cursor: pointer; }
    .prompt-item-text { font-size: 13px; color: var(--text); line-height: 1.4; }
    .prompt-item-id { font-size: 11px; color: var(--muted); font-weight: 600; margin-right: 4px; }
    .prompt-preview {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--green-light);
      border: 1px solid var(--green);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--green);
      font-weight: 500;
    }
    .prompt-preview-remove {
      background: none;
      border: none;
      color: var(--green);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 0 2px;
      line-height: 1;
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      header { padding: 12px 16px; }
      main { margin: 16px auto; }
    }
  </style>
</head>

<main>

  <!-- FORM -->
  <div class="card">
    <h2>Datos del hotel</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre del hotel</label>
        <input type="text" id="hotel-name" placeholder=""/>
      </div>
      <div class="form-group">
        <label>Ciudad</label>
        <input type="text" id="hotel-city" placeholder=""/>
      </div>
      <div class="form-group">
        <label>Aliases / nombres alternativos</label>
        <input type="text" id="hotel-aliases" placeholder=""/>
      </div>
      <div class="form-group">
        <label>Web del hotel</label>
        <input type="text" id="hotel-web" placeholder=""/>
      </div>
    </div>
  </div>

  <!-- CONFIG -->
  <div class="card">
    <h2>Configuración del test</h2>

    <div class="form-group" style="margin-bottom:20px">
      <label>Prompts a testear <span style="font-weight:400;color:var(--muted)">(máx. 5)</span></label>
      <div class="prompts-dropdown">
        <button class="prompts-toggle" onclick="togglePromptsList()" type="button">
          <span id="prompts-toggle-label">Selecciona prompts</span>
          <span class="chevron">&#8964;</span>
        </button>
        <div class="prompts-list" id="prompts-list" style="display:none">
          <div class="prompts-list-inner" id="prompts-list-inner"></div>
        </div>
      </div>
      <div id="selected-prompts-preview" style="margin-top:10px;display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <div class="form-group" style="margin-bottom:20px">
      <label>Idiomas</label>
      <div class="selector-group lang-group">
        <button class="selector-btn active" data-lang="ES" onclick="selectLang(this)">Español</button>
        <button class="selector-btn active" data-lang="EN" onclick="selectLang(this)">English</button>
      </div>
    </div>

    <div class="form-group">
      <label>IAs a testear</label>
      <div class="ia-grid">
        <label class="ia-chip active"><input type="checkbox" value="chatgpt" checked onchange="toggleIA(this)"> ChatGPT</label>
        <label class="ia-chip active"><input type="checkbox" value="perplexity" checked onchange="toggleIA(this)"> Perplexity</label>
        <label class="ia-chip active"><input type="checkbox" value="gemini" checked onchange="toggleIA(this)"> Gemini</label>
        <label class="ia-chip active"><input type="checkbox" value="claude" checked onchange="toggleIA(this)"> Claude</label>
        <label class="ia-chip active"><input type="checkbox" value="copilot" checked onchange="toggleIA(this)"> Copilot</label>
      </div>
    </div>
  </div>

  <!-- RUN -->
  <button class="btn-run" id="btn-run" onclick="runTest()">
    Analizar visibilidad del hotel
  </button>

  <!-- PROGRESS -->
  <div class="card" id="progress-section">
    <div class="progress-header">
      <h2>Analizando...</h2>
      <span id="progress-count" style="font-size:13px;color:var(--muted);font-weight:600">0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar"></div>
    </div>
    <div style="overflow-x:auto">
      <table class="results-table">
        <thead>
          <tr>
            <th>IA</th>
            <th>Prompt</th>
            <th>Idioma</th>
            <th>Resultado</th>
            <th>Extracto</th>
          </tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="card" id="summary-section">
    <h2>Informe de visibilidad</h2>
    <div class="summary-grid" id="summary-grid"></div>

    <div class="section-divider">Visibilidad por IA</div>
    <div class="ia-summary" id="ia-summary"></div>

    <div class="verdict-box" id="verdict-box">
      <h3></h3>
      <p></p>
    </div>

    <div style="margin-top:20px;display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn-secondary" onclick="resetForm()">Nuevo análisis</button>
      <button class="btn-secondary" onclick="window.print()">Imprimir informe</button>
    </div>
  </div>


  <!-- CONEXIONES -->
  <div class="card" id="conexiones-card">
    <h2>Conexiones</h2>
    <div class="form-group">
      <label>API Key OpenRouter</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="password" id="openrouter-key" placeholder="" style="flex:1"
          oninput="saveKey(this.value)"/>
        <button class="btn-secondary" style="white-space:nowrap" onclick="toggleKeyVisibility()">Mostrar</button>
      </div>
      <span id="key-status" style="font-size:12px;color:var(--muted);margin-top:4px"></span>
    </div>
  </div>

</main>

let completedCalls   = 0;

// ─── PROMPTS DROPDOWN ─────────────────────────────────────
function buildPromptsList() {
  const inner = document.getElementById('prompts-list-inner');
  let currentBlock = '';
  ALL_PROMPTS.forEach(p => {
    if (p.block !== currentBlock) {
      currentBlock = p.block;
      const lbl = document.createElement('div');
      lbl.className = 'prompt-block-label';
      lbl.textContent = p.block;
      inner.appendChild(lbl);
    }
    const item = document.createElement('label');
    item.className = 'prompt-item';
    item.innerHTML = `
      <input type="checkbox" value="${p.id}" onchange="togglePrompt('${p.id}')"/>
      <span class="prompt-item-text"><span class="prompt-item-id">${p.id}</span>${p.es}</span>
    `;
    inner.appendChild(item);
  });
}

function togglePromptsList() {
  const list = document.getElementById('prompts-list');
  list.style.display = list.style.display === 'none' ? 'block' : 'none';
}

function togglePrompt(id) {
  if (selectedPromptIds.includes(id)) {
    selectedPromptIds = selectedPromptIds.filter(x => x !== id);
  } else {
    if (selectedPromptIds.length >= 5) {
      // desmarcar el checkbox
      document.querySelector(`.prompt-item input[value="${id}"]`).checked = false;
      alert('Máximo 5 prompts. Desmarca uno antes de añadir otro.');
      return;
    }
    selectedPromptIds.push(id);
  }
  updatePromptToggleLabel();
  updateSelectedPreview();
}

function updatePromptToggleLabel() {
  const n = selectedPromptIds.length;
  document.getElementById('prompts-toggle-label').textContent =
    n === 0 ? 'Selecciona prompts' : `${n} prompt${n > 1 ? 's' : ''} seleccionado${n > 1 ? 's' : ''}`;
}

function updateSelectedPreview() {
  const preview = document.getElementById('selected-prompts-preview');
  preview.innerHTML = '';
  selectedPromptIds.forEach(id => {
    const p = ALL_PROMPTS.find(x => x.id === id);
    if (!p) return;
    const div = document.createElement('div');
    div.className = 'prompt-preview';
    div.innerHTML = `<span><strong>${p.id}</strong> — ${p.es.length > 60 ? p.es.slice(0,60)+'…' : p.es}</span>
      <button class="prompt-preview-remove" onclick="removePrompt('${id}')" type="button">x</button>`;
    preview.appendChild(div);
  });
}

function removePrompt(id) {
  const cb = document.querySelector(`.prompt-item input[value="${id}"]`);
  if (cb) cb.checked = false;
  selectedPromptIds = selectedPromptIds.filter(x => x !== id);
  updatePromptToggleLabel();
  updateSelectedPreview();
}

// Cerrar dropdown al hacer click fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.prompts-dropdown')) {
    const list = document.getElementById('prompts-list');
    if (list) list.style.display = 'none';
  }
});


// ─── API KEY ──────────────────────────────────────────────
function saveKey(val) {
  localStorage.setItem("openrouter_api_key", val);
  document.getElementById("key-status").textContent = val ? "Guardada en este navegador" : "";
}

function toggleKeyVisibility() {
  const input = document.getElementById("openrouter-key");
  const btn = input.nextElementSibling;
  if (input.type === "password") {
    input.type = "text";
    btn.textContent = "Ocultar";
  } else {
    input.type = "password";
    btn.textContent = "Mostrar";
  }
}

function loadSavedKey() {
  const saved = localStorage.getItem("openrouter_api_key");
  if (saved) {
    document.getElementById("openrouter-key").value = saved;
    document.getElementById("key-status").textContent = "Guardada en este navegador";
  }
}

document.addEventListener("DOMContentLoaded", () => {
  buildPromptsList();
  loadSavedKey();
});



function getSelectedPrompts() {
  return ALL_PROMPTS.filter(p => selectedPromptIds.includes(p.id));
}

function selectLang(btn) {
  const lang = btn.dataset.lang;
  if (selectedLangs.has(lang)) {
    if (selectedLangs.size === 1) return; // al menos uno
    selectedLangs.delete(lang);
    btn.classList.remove('active');
  } else {
    selectedLangs.add(lang);
    btn.classList.add('active');
  }
}

function toggleIA(cb) {
  cb.closest('.ia-chip').classList.toggle('active', cb.checked);
}

function getSelectedIAs() {
  return Array.from(document.querySelectorAll('.ia-chip input:checked')).map(cb => cb.value);
}

function getSelectedPrompts() {
  // Distribuidos por bloque: tomar los primeros N de forma representativa
  const picks = [0, 4, 9, 14, 18]; // índices representativos: P01,P05,P10,P15,P19
  return picks.slice(0, selectedPrompts).map(i => ALL_PROMPTS[i]);
}

// ─── MAIN TEST ────────────────────────────────────────────
async function runTest() {
  const hotelName  = document.getElementById('hotel-name').value.trim();
  const city       = document.getElementById('hotel-city').value.trim();
  const aliases    = document.getElementById('hotel-aliases').value.trim();
  const hotelWeb   = document.getElementById('hotel-web').value.trim();
  const ias        = getSelectedIAs();

  const apiKey = localStorage.getItem("openrouter_api_key") || "";
  if (!apiKey) { alert('Introduce tu API Key de OpenRouter en la sección Conexiones.'); return; }
  if (!hotelName || !city)         { alert('Por favor introduce el nombre del hotel y la ciudad.'); return; }
  if (ias.length === 0)            { alert('Selecciona al menos una IA.'); return; }
  if (selectedPromptIds.length === 0) { alert('Selecciona al menos un prompt.'); return; }

  // Reset
  results = [];
  completedCalls = 0;
  document.getElementById('results-body').innerHTML = '';
  document.getElementById('summary-section').style.display = 'none';
  document.getElementById('progress-section').style.display = 'block';
  document.getElementById('btn-run').disabled = true;

  const prompts = getSelectedPrompts();
  const langs   = Array.from(selectedLangs);

  // Calcular total de llamadas
  totalCalls = prompts.length * langs.length * ias.length;
  updateProgress();

  // Crear filas placeholder
  const tbody = document.getElementById('results-body');
  const tasks = [];

  for (const prompt of prompts) {
    for (const lang of langs) {
      for (const ia of ias) {
        const promptText = lang === 'ES'
          ? prompt.es.replace(/{{city}}/g, city)
          : prompt.en.replace(/{{city}}/g, city);

        const rowId = `row-${prompt.id}-${lang}-${ia}`;
        const tr = document.createElement('tr');
        tr.id = rowId;
        tr.innerHTML = `
          <td><strong>${IA_MODELS[ia].name}</strong></td>
          <td style="font-size:12px;max-width:220px">${promptText}</td>
          <td>${lang}</td>
          <td><span class="badge badge-loading"><span class="spinner"></span> Analizando</span></td>
          <td>—</td>
        `;
        tbody.appendChild(tr);

        tasks.push({ prompt, lang, ia, promptText, rowId, hotelName, city, aliases, hotelWeb });
      }
    }
  }

  // Ejecutar en paralelo (máx 5 simultáneas)
  await runWithConcurrency(tasks, 5);

  showSummary(hotelName, city);
  document.getElementById('btn-run').disabled = false;
}

async function runWithConcurrency(tasks, limit) {
  const queue = [...tasks];
  const workers = Array(Math.min(limit, queue.length)).fill(null).map(async () => {
    while (queue.length > 0) {
      const task = queue.shift();
      if (task) await processTask(task);
    }
  });
  await Promise.all(workers);
}

async function processTask({ prompt, lang, ia, promptText, rowId, hotelName, city, aliases, hotelWeb }) {
  const recordId = `HT-${Date.now().toString().slice(-6)}-${ia.slice(0,2).toUpperCase()}`;
  let result = { id: recordId, prompt, lang, ia, promptText, hotelName, city, aliases, hotelWeb, appears: false, excerpt: '', sources: '' };

  try {
    // 1. Llamada a la IA via OpenRouter
    const aiResponse = await callOpenRouter(IA_MODELS[ia].model, promptText);
    const fullText   = aiResponse || '';
    result.excerpt   = fullText.slice(0, 1900);
    result.sources   = extractSources(fullText);

    // 2. Detección de mención del hotel
    result.appears = await detectMention(fullText, hotelName, aliases);

    // 3. Actualizar fila en tabla
    updateRow(rowId, result);

    // 4. Enviar a Pabbly
    await sendToPabbly(result);

  } catch (err) {
    console.error('Error en task:', err);
    const tr = document.getElementById(rowId);
    if (tr) tr.querySelector('td:nth-child(4)').innerHTML = '<span class="badge badge-loading">Error</span>';
  }

  results.push(result);
  completedCalls++;
  updateProgress();
}

async function callOpenRouter(model, prompt) {
  const key = localStorage.getItem('openrouter_api_key') || OPENROUTER_API_KEY;
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${key}`,
      'Content-Type': 'application/json',
      'HTTP-Referer': 'https://powlin.com',
      'X-Title': 'Powlin Hotel AI Tracker'
    },
    body: JSON.stringify({
      model,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 800
    })
  });
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

async function detectMention(text, hotelName, aliases) {
  const allNames = [hotelName, ...aliases.split(',').map(a => a.trim()).filter(Boolean)].join(', ');
  const detectionPrompt = `Analiza si el siguiente texto menciona el hotel "${hotelName}" o alguno de sus aliases: ${allNames}.
Responde ÚNICAMENTE con "YES" si aparece mencionado (aunque sea parcialmente, con variaciones o alias), o "NO" si no aparece en absoluto.
No expliques nada más.

TEXTO:
${text.slice(0, 2000)}`;

  try {
    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${localStorage.getItem('openrouter_api_key') || OPENROUTER_API_KEY}`,
        'Content-Type': 'application/json',
        'HTTP-Referer': 'https://powlin.com',
        'X-Title': 'Powlin Hotel AI Tracker'
      },
      body: JSON.stringify({
        model: 'openai/gpt-4o-mini',
        messages: [{ role: 'user', content: detectionPrompt }],
        max_tokens: 5,
        temperature: 0
      })
    });
    const data = await res.json();
    const answer = data.choices?.[0]?.message?.content?.trim().toUpperCase() || 'NO';
    return answer.includes('YES');
  } catch { return false; }
}

function extractSources(text) {
  const urlRegex = /https?:\/\/[^\s\)\]]+/g;
  const urls = text.match(urlRegex) || [];
  return urls.slice(0, 5).join(', ');
}

function updateRow(rowId, result) {
  const tr = document.getElementById(rowId);
  if (!tr) return;
  const badge = result.appears
    ? '<span class="badge badge-green">APARECE</span>'
    : '<span class="badge badge-red">NO APARECE</span>';
  const excerpt = result.excerpt
    ? `<div class="excerpt">${result.excerpt.replace(/</g,'&lt;').slice(0,120)}…</div>`
    : '—';
  tr.querySelector('td:nth-child(4)').innerHTML = badge;
  tr.querySelector('td:nth-child(5)').innerHTML = excerpt;
}

async function sendToPabbly(result) {
  const payload = {
    nombre_registro: result.id,
    hotel:           result.hotelName,
    web:             result.hotelWeb,
    aliases:         result.aliases,
    ciudad:          result.city,
    ia:              IA_MODELS[result.ia].name,
    prompt_id:       result.prompt.id,
    idioma:          result.lang,
    prompt_texto:    result.promptText.slice(0, 500),
    resultado:       result.appears ? 'APARECE' : 'NO APARECE',
    extracto:        result.excerpt.slice(0, 1900),
    fuentes:         result.sources.slice(0, 500),
    fecha_test:      new Date().toISOString().split('T')[0],
    ejecutado_por:   'Carlos - Powlin Sales'
  };
  try {
    await fetch(PABBLY_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      mode: 'no-cors'
    });
  } catch (e) { console.warn('Pabbly error:', e); }
}

function updateProgress() {
  const pct = totalCalls > 0 ? Math.round((completedCalls / totalCalls) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-count').textContent = `${completedCalls} / ${totalCalls}`;
  document.querySelector('#progress-section h2').textContent =
    completedCalls === totalCalls ? 'Análisis completado' : 'Analizando...';
}

// ─── SUMMARY ──────────────────────────────────────────────
function showSummary(hotelName, city) {
  const total    = results.length;
  const appears  = results.filter(r => r.appears).length;
  const noAppears = total - appears;
  const score    = total > 0 ? Math.round((appears / total) * 100) : 0;

  // Summary cards
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = `
    <div class="summary-card neutral">
      <div class="number">${total}</div>
      <div class="label">Tests realizados</div>
    </div>
    <div class="summary-card green">
      <div class="number">${appears}</div>
      <div class="label">Aparece en IA</div>
    </div>
    <div class="summary-card red">
      <div class="number">${noAppears}</div>
      <div class="label">No aparece</div>
    </div>
    <div class="summary-card ${score >= 50 ? 'green' : 'red'}">
      <div class="number">${score}%</div>
      <div class="label">Visibilidad IA</div>
    </div>
  `;

  // Por IA
  const iaSummaryEl = document.getElementById('ia-summary');
  iaSummaryEl.innerHTML = '';
  const selectedIAs = getSelectedIAs();
  for (const ia of selectedIAs) {
    const iaResults   = results.filter(r => r.ia === ia);
    const iaAppears   = iaResults.filter(r => r.appears).length;
    const iaTotal     = iaResults.length;
    const iaPct       = iaTotal > 0 ? Math.round((iaAppears / iaTotal) * 100) : 0;
    iaSummaryEl.innerHTML += `
      <div class="ia-row">
        <div class="ia-name">${IA_MODELS[ia].name}</div>
        <div class="ia-bar-wrap"><div class="ia-bar-fill" style="width:${iaPct}%;background:${iaPct > 0 ? 'var(--green)' : 'var(--red)'}"></div></div>
        <div class="ia-score">${iaAppears}/${iaTotal}</div>
      </div>
    `;
  }

  // Veredicto
  const verdictBox = document.getElementById('verdict-box');
  if (score === 0) {
    verdictBox.className = 'verdict-box red-box';
    verdictBox.querySelector('h3').textContent = `${hotelName} es invisible para la IA`;
    verdictBox.querySelector('p').textContent  = `En ninguno de los ${total} tests realizados en ${selectedIAs.length} IAs diferentes, el hotel ${hotelName} aparece como recomendación. Cuando un viajero pregunta a ChatGPT, Perplexity, Gemini u otras IAs por hoteles en ${city}, su hotel sencillamente no existe. Powlin puede cambiar eso.`;
  } else if (score < 40) {
    verdictBox.className = 'verdict-box red-box';
    verdictBox.querySelector('h3').textContent = `${hotelName} tiene visibilidad muy baja`;
    verdictBox.querySelector('p').textContent  = `Solo aparece en el ${score}% de los tests. La gran mayoría de viajeros que consultan a una IA sobre hoteles en ${city} no encontrarán ${hotelName}. Hay una oportunidad clara de mejora.`;
  } else {
    verdictBox.className = 'verdict-box green-box';
    verdictBox.querySelector('h3').textContent = `${hotelName} tiene presencia en IA`;
    verdictBox.querySelector('p').textContent  = `Aparece en el ${score}% de los tests. Tiene una base de visibilidad, pero aún hay IAs y prompts donde no aparece. Powlin puede consolidar y ampliar esa presencia.`;
  }

  document.getElementById('summary-section').style.display = 'block';
  document.getElementById('summary-section').scrollIntoView({ behavior: 'smooth' });
}

function resetForm() {
  results = [];
  document.getElementById('results-body').innerHTML = '';
  document.getElementById('progress-section').style.display = 'none';
  document.getElementById('summary-section').style.display  = 'none';
  document.getElementById('hotel-name').value  = '';
  document.getElementById('hotel-city').value  = '';
  document.getElementById('hotel-aliases').value = '';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
